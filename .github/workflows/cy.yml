name: CI
on:
  push:
    branches: [master]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: "gradle"

      - name: Grant execute permission to gradlew script
        run: chmod +x gradlew

      - name: Build y test
        run: ./gradlew build --no-daemon